# ================= SERVER =================
server.port=8080
spring.application.name=exam-system

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/exam_system_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# ================= JWT =================
jwt.secret=mysupersecretkeymysupersecretkeymysupersecretkey123
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ================= LOGGING =================
logging.level.com.exam.system=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ================= FILE UPLOAD =================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================= JACKSON =================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=Asia/Kolkata
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
